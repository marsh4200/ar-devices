esphome:
  project:
    name: "AR Smart Home.POWR320D"
    version: "4.2.0"

  on_boot:
    priority: 250
    then:
      - if:
          condition:
            lambda: 'return id(v_sensor).state > 10;'
          then:
            - switch.turn_on: relay_1
          else:
            - switch.turn_off: relay_1

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf

logger:
  level: INFO
  baud_rate: 115200

# ---------------------------
# UART (POWER CHIP)
# ---------------------------
uart:
  id: uart_bus
  rx_pin: GPIO16
  baud_rate: 4800
  parity: EVEN

# ---------------------------
# TIME
# ---------------------------
time:
  - platform: homeassistant
    id: homeassistant_time

# ---------------------------
# BLE
# ---------------------------
bluetooth_proxy:
  active: true

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

# ---------------------------
# SENSORS
# ---------------------------
sensor:
  - platform: cse7766
    current:
      name: "Current"
      id: a_sensor
      filters:
        - throttle_average: 2s

    voltage:
      name: "Voltage"
      id: v_sensor
      filters:
        - throttle_average: 2s

    power:
      name: "Power"
      id: w_sensor
      filters:
        - throttle_average: 2s
      on_value_range:
        - above: 4.0
          then:
            - light.turn_on: switch_led
        - below: 3.0
          then:
            - light.turn_off: switch_led

    energy:
      name: "Energy"
      id: wh_sensor
      filters:
        - throttle_average: 2s

  - platform: total_daily_energy
    name: "Daily Energy"
    power_id: w_sensor
    filters:
      - multiply: 0.001

  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 60s

  - platform: uptime
    id: uptime_sensor
    internal: true
    on_raw_value:
      then:
        - text_sensor.template.publish:
            id: uptime_human
            state: !lambda |-
              int seconds = (int)round(id(uptime_sensor).raw_state);
              int days = seconds / 86400;
              seconds %= 86400;
              int hours = seconds / 3600;
              seconds %= 3600;
              int minutes = seconds / 60;
              seconds %= 60;
              return (
                (days ? to_string(days) + "d " : "") +
                (hours ? to_string(hours) + "h " : "") +
                (minutes ? to_string(minutes) + "m " : "") +
                (to_string(seconds) + "s")
              ).c_str();

  - platform: internal_temperature
    name: "Internal Temp"
    id: esp32_temp

  - platform: template
    name: "Power Factor"
    device_class: power_factor
    id: power_factor
    lambda: |-
      if (id(v_sensor).state == 0 || id(a_sensor).state == 0) return 0;
      return id(w_sensor).state / (id(v_sensor).state * id(a_sensor).state);

# ---------------------------
# BUTTON
# ---------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    id: reset
    internal: true
    filters:
      - delayed_off: 10ms

    on_click:
      - max_length: 350ms
        then:
          - switch.toggle: relay_1

      - min_length: 360ms
        max_length: 3s
        then:
          - if:
              condition:
                binary_sensor.is_on: page
              then:
                - binary_sensor.template.publish:
                    id: page
                    state: OFF
              else:
                - binary_sensor.template.publish:
                    id: page
                    state: ON

  - platform: template
    id: page
    publish_initial_state: true
    internal: true

  - platform: template
    name: "Load"
    id: load_on
    lambda: |-
      if (isnan(id(w_sensor).state)) return {};
      return id(w_sensor).state > 4;

# ---------------------------
# DISPLAY
# ---------------------------
display:
  platform: tm1621
  id: tm1621_display
  cs_pin: GPIO25
  data_pin: GPIO14
  read_pin: GPIO26
  write_pin: GPIO27

  lambda: |-
    if (id(page).state) {
      it.display_voltage(true);
      it.display_kwh(false);
      it.printf(0, "%.1f", id(v_sensor).state);
      it.printf(1, "%.1f", id(a_sensor).state);
    } else {
      it.display_voltage(false);
      it.display_kwh(true);
      it.printf(0, "%.1f", id(wh_sensor).state);
      it.printf(1, "%.1f", id(w_sensor).state);
    }

# ---------------------------
# LED
# ---------------------------
output:
  - platform: ledc
    id: led
    pin:
      number: GPIO18
      inverted: true

light:
  - platform: monochromatic
    id: switch_led
    output: led
    internal: true

  - platform: status_led
    id: wifi_status_led
    internal: true
    pin:
      number: GPIO5
      inverted: true

# ---------------------------
# RELAY (SAFE CONTROL)
# ---------------------------
switch:
  - platform: template
    name: "Relay"
    optimistic: true
    id: relay_1
    turn_off_action:
      - switch.turn_on: relay_off
    turn_on_action:
      - switch.turn_on: relay_on

  - platform: gpio
    restore_mode: ALWAYS_OFF
    internal: true
    id: relay_off
    pin: GPIO4
    on_turn_on:
      - delay: 500ms
      - switch.turn_off: relay_off
      - light.turn_off: switch_led
    interlock: [relay_on]

  - platform: gpio
    restore_mode: ALWAYS_OFF
    internal: true
    id: relay_on
    pin: GPIO2
    on_turn_on:
      - delay: 500ms
      - switch.turn_off: relay_on
      - light.turn_on: switch_led
    interlock: [relay_off]

  - platform: restart
    name: "Restart"

# ---------------------------
# TEXT
# ---------------------------
text_sensor:
  - platform: template
    name: "Uptime"
    id: uptime_human

  - platform: wifi_info
    ip_address:
      name: "IP"
    ssid:
      name: "SSID"
    bssid:
      name: "BSSID"

# ---------------------------
# WIFI STATUS CHECK
# ---------------------------
interval:
  - interval: 30s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on: wifi_status_led
          else:
            - light.turn_off: wifi_status_led
