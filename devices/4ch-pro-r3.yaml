esphome:
  project:
    name: "AR Smart Home.4CH-PRO-R3"
    version: "1.0.0"

esp8266:
  board: esp8285

logger:

# ---------------------------
# RELAYS
# ---------------------------
switch:
  - platform: gpio
    id: relay_1
    name: "Switch 1"
    pin: GPIO12
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: relay_2
    name: "Switch 2"
    pin: GPIO5
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: relay_3
    name: "Switch 3"
    pin: GPIO4
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: relay_4
    name: "Switch 4"
    pin: GPIO15
    restore_mode: RESTORE_DEFAULT_OFF

# ---------------------------
# BUTTONS
# ---------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    id: button_1
    on_click:
      # SHORT → Switch 1
      - min_length: 50ms
        max_length: 799ms
        then:
          - switch.toggle: relay_1

      # LONG → Switch 2
      - min_length: 800ms
        max_length: 5s
        then:
          - switch.toggle: relay_2

  - platform: gpio
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
      inverted: true
    id: button_2
    on_click:
      # SHORT → Switch 4
      - min_length: 50ms
        max_length: 799ms
        then:
          - switch.toggle: relay_4

      # LONG → Switch 3
      - min_length: 800ms
        max_length: 5s
        then:
          - switch.toggle: relay_3

# ---------------------------
# STATUS LED
# ---------------------------
status_led:
  pin: GPIO13

# ---------------------------
# DIAGNOSTICS
# ---------------------------
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 90s
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    update_interval: 300s
    entity_category: diagnostic
