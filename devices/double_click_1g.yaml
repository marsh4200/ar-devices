substitutions:
  device_model: Sonoff Switch

script:
  - id: publish_button_event
    mode: queued
    parameters:
      button: int
      action: string
      count: int
    then:
      - homeassistant.event:
          event: esphome.sonoff_switch_button
          data:
            model: ${device_model}
            action: !lambda return action.c_str();
            button: !lambda return button;
            count: !lambda return count;

  - id: handle_single_click
    mode: queued
    parameters:
      button: int
    then:
      - script.execute:
          id: publish_button_event
          button: !lambda return button;
          action: "click"
          count: 1
      - switch.toggle: relay_1

  - id: handle_long_press
    mode: queued
    parameters:
      button: int
    then:
      - script.execute:
          id: publish_button_event
          button: !lambda return button;
          action: "long_press"
          count: 1

  - id: handle_double_click
    mode: queued
    parameters:
      button: int
    then:
      - lambda: |-
          std::string action = id(sl_button_1_double_click_action).state;
          std::string target = id(txt_button_1_double_click_target).state;

          if (action == "Relay 1 (toggle)") {
            id(relay_1).toggle();
          }

          if (action == "Home Assistant target (toggle)" && !target.empty()) {
            id(homeassistant).call_service("homeassistant.toggle", {{"entity_id", target}});
          }

          if (action == "Home Assistant target (turn on)" && !target.empty()) {
            id(homeassistant).call_service("homeassistant.turn_on", {{"entity_id", target}});
          }

          if (action == "Home Assistant target (turn off)" && !target.empty()) {
            id(homeassistant).call_service("homeassistant.turn_off", {{"entity_id", target}});
          }

select:
  - platform: template
    id: sl_button_1_double_click_action
    name: Button 1 double-click action
    optimistic: true
    restore_value: true
    entity_category: config
    options:
      - None
      - Relay 1 (toggle)
      - Relay 2 (toggle)
      - Relay 3 (toggle)
      - Home Assistant target (toggle)
      - Home Assistant target (turn on)
      - Home Assistant target (turn off)
      - Cover target (open)
      - Cover target (close)
      - Cover target (stop)
      - Cover target (toggle)
      - Media player target (play/pause)
      - Media player target (next track)
      - Media player target (previous track)
      - Media player target (stop)
      - Script target (run)
      - Scene target (activate)
      - Button target (press)
      - Automation target (trigger)
    initial_option: None

text:
  - platform: template
    id: txt_button_1_double_click_target
    name: Button 1 double-click target
    optimistic: true
    restore_value: true
    entity_category: config
