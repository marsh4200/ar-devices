substitutions:
  device_model: Sonoff Switch

script:
  - id: publish_button_event
    mode: queued
    parameters:
      button: int
      action: string
      count: int
    then:
      - homeassistant.event:
          event: esphome.sonoff_switch_button
          data:
            model: ${device_model}
            action: !lambda return action.c_str();
            button: !lambda return button;
            count: !lambda return count;
      - if:
          condition:
            lambda: return button == 1;
          then:
            - text_sensor.template.publish:
                id: ts_button_1_last_action
                state: !lambda return action.c_str();
      - text_sensor.template.publish:
          id: ts_last_button_event
          state: !lambda |-
            char buffer[48];
            snprintf(buffer, sizeof(buffer), "Button %d: %s (%d)", button, action.c_str(), count);
            return std::string(buffer);

  - id: handle_single_click
    mode: queued
    parameters:
      button: int
    then:
      - script.execute:
          id: publish_button_event
          button: !lambda return button;
          action: "click"
          count: 1
      - switch.toggle: relay_1

  - id: handle_long_press
    mode: queued
    parameters:
      button: int
    then:
      - script.execute:
          id: publish_button_event
          button: !lambda return button;
          action: "long_press"
          count: 1
      - if:
          condition:
            lambda: return id(sl_button_1_long_press_action).state == "Relay 1 (toggle)";
          then:
            - switch.toggle: relay_1

      - if:
          condition:
            lambda: return id(sl_button_1_long_press_action).state == "Home Assistant target (toggle)" && !id(txt_button_1_long_press_target).state.empty();
          then:
            - homeassistant.action:
                action: homeassistant.toggle
                data:
                  entity_id: !lambda return id(txt_button_1_long_press_target).state.c_str();

      - if:
          condition:
            lambda: return id(sl_button_1_long_press_action).state == "Home Assistant target (turn on)" && !id(txt_button_1_long_press_target).state.empty();
          then:
            - homeassistant.action:
                action: homeassistant.turn_on
                data:
                  entity_id: !lambda return id(txt_button_1_long_press_target).state.c_str();

      - if:
          condition:
            lambda: return id(sl_button_1_long_press_action).state == "Home Assistant target (turn off)" && !id(txt_button_1_long_press_target).state.empty();
          then:
            - homeassistant.action:
                action: homeassistant.turn_off
                data:
                  entity_id: !lambda return id(txt_button_1_long_press_target).state.c_str();

select:
  - platform: template
    id: sl_button_1_long_press_action
    name: Button 1 long-press action
    optimistic: true
    restore_value: true
    icon: mdi:gesture-tap-hold
    entity_category: config
    options:
      - None
      - Relay 1 (toggle)
      - Relay 2 (toggle)
      - Relay 3 (toggle)
      - Home Assistant target (toggle)
      - Home Assistant target (turn on)
      - Home Assistant target (turn off)
      - Cover target (open)
      - Cover target (close)
      - Cover target (stop)
      - Cover target (toggle)
      - Media player target (play/pause)
      - Media player target (next track)
      - Media player target (previous track)
      - Media player target (stop)
      - Script target (run)
      - Scene target (activate)
      - Button target (press)
      - Automation target (trigger)
    initial_option: None

text:
  - platform: template
    id: txt_button_1_long_press_target
    name: Button 1 long-press target
    mode: text
    optimistic: true
    restore_value: true
    entity_category: config
    icon: mdi:form-textbox
    initial_value: ""
    min_length: 0
    max_length: 100

text_sensor:
  - platform: template
    id: ts_button_1_last_action
    name: Button 1 last action
    icon: mdi:gesture-tap
    entity_category: diagnostic

  - platform: template
    id: ts_last_button_event
    name: Last button event
    icon: mdi:timeline-text-outline
    entity_category: diagnostic
