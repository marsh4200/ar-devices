esphome:
  project:
    name: "AR Smart Home.ESP HOME POWR320D"
    version: "1.0.0"

  on_boot:
    priority: 250.0
    then:
      - if:
          condition:
            lambda: 'return id(v_sensor).state > 10;'
          then:
            - switch.turn_on: relay_1
          else:
            - switch.turn_off: relay_1

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf

# ---------------------------
# UART
# ---------------------------
uart:
  rx_pin: GPIO16
  baud_rate: 4800
  parity: EVEN

# ---------------------------
# BLE
# ---------------------------
esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

bluetooth_proxy:
  active: true

# ---------------------------
# TIME
# ---------------------------
time:
  - platform: homeassistant
    id: homeassistant_time

# ---------------------------
# OUTPUTS
# ---------------------------
output:
  - platform: ledc
    id: led
    pin:
      number: GPIO18
      inverted: true

# ---------------------------
# LIGHTS
# ---------------------------
light:
  - platform: monochromatic
    id: switch_led
    output: led
    internal: true

  - platform: status_led
    id: wifi_status_led
    internal: true
    pin:
      number: GPIO5
      inverted: true

# ---------------------------
# RELAYS
# ---------------------------
switch:
  - platform: template
    name: "Geyser"
    optimistic: true
    id: relay_1
    turn_off_action:
      - switch.turn_on: relay_off

    turn_on_action:
      - switch.turn_on: relay_on

  - platform: gpio
    restore_mode: ALWAYS_OFF
    internal: true
    id: relay_off
    pin: GPIO4
    interlock: [relay_on]

    on_turn_on:
      - delay: 500ms
      - switch.turn_off: relay_off
      - light.turn_off: switch_led

  - platform: gpio
    restore_mode: ALWAYS_OFF
    internal: true
    id: relay_on
    pin: GPIO2
    interlock: [relay_off]

    on_turn_on:
      - delay: 500ms
      - switch.turn_off: relay_on
      - light.turn_on: switch_led

  - platform: restart
    name: "Restart"

# ---------------------------
# BUTTONS
# ---------------------------
binary_sensor:
  - platform: gpio
    pin: GPIO0
    id: reset
    internal: true

    filters:
      - invert:
      - delayed_off: 10ms

    on_click:
      - max_length: 350ms
        then:
          - switch.toggle: relay_1

      - min_length: 360ms
        max_length: 3s
        then:
          - if:
              condition:
                binary_sensor.is_on: page
              then:
                - binary_sensor.template.publish:
                    id: page
                    state: OFF
              else:
                - binary_sensor.template.publish:
                    id: page
                    state: ON

  - platform: template
    id: page
    publish_initial_state: true
    internal: true

  - platform: template
    name: "Load"
    id: load_on

    lambda: |-
      if (isnan(id(w_sensor).state)) return {};
      return id(w_sensor).state > 4;

# ---------------------------
# POWER MONITORING
# ---------------------------
sensor:
  - platform: cse7766

    current:
      name: "Current"
      id: a_sensor
      filters:
        - throttle_average: 2s

    voltage:
      name: "Voltage"
      id: v_sensor
      filters:
        - throttle_average: 2s

    power:
      name: "Power"
      id: w_sensor
      filters:
        - throttle_average: 2s

      on_value_range:
        - above: 4.0
          then:
            - light.turn_on: switch_led

        - below: 3.0
          then:
            - light.turn_off: switch_led

    energy:
      name: "Energy"
      id: wh_sensor
      filters:
        - throttle_average: 2s

  - platform: total_daily_energy
    name: "Daily Energy"
    power_id: w_sensor

    filters:
      - multiply: 0.001

    unit_of_measurement: kWh

  - platform: template
    name: "Power Factor"
    id: power_factor
    device_class: power_factor

    lambda: |-
      if (id(v_sensor).state * id(a_sensor).state == 0) return 0;
      return id(w_sensor).state / (id(v_sensor).state * id(a_sensor).state);

  - platform: internal_temperature
    name: "ESP32 Temperature"
    id: esp32_temp

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 90s
    entity_category: diagnostic

  - platform: uptime
    id: uptime_sensor
    internal: true

# ---------------------------
# TEXT SENSORS
# ---------------------------
text_sensor:
  - platform: template
    name: "Uptime"
    id: uptime_human
    icon: mdi:clock-start

  - platform: wifi_info
    ip_address:
      name: "IP Address"

    ssid:
      name: "SSID"

    bssid:
      name: "BSSID"

# ---------------------------
# DISPLAY
# ---------------------------
display:
  platform: tm1621
  id: tm1621_display

  cs_pin: GPIO25
  data_pin: GPIO14
  read_pin: GPIO26
  write_pin: GPIO27

  lambda: |-
    if (id(page).state) {

      it.display_voltage(true);
      it.display_kwh(false);

      it.printf(0, "%.1f", id(v_sensor).state);
      it.printf(1, "%.1f", id(a_sensor).state);

    } else {

      it.display_voltage(false);
      it.display_kwh(true);

      it.printf(0, "%.1f", id(wh_sensor).state);
      it.printf(1, "%.1f", id(w_sensor).state);
    }

# ---------------------------
# STATUS INTERVAL
# ---------------------------
interval:
  - interval: 30s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on: wifi_status_led
          else:
            - light.turn_off: wifi_status_led
