esphome:
  project:
    name: "AR Smart Home.BASIC-R2"
    version: "1.0.0"

esp8266:
  board: esp01_1m

logger:

# ---------------------------
# RELAY
# ---------------------------
switch:
  - platform: gpio
    id: relay
    name: "Switch"
    pin: GPIO12
    restore_mode: RESTORE_DEFAULT_OFF

# ---------------------------
# BUTTON
# ---------------------------
binary_sensor:
  - platform: gpio
    id: button
    pin:
      number: GPIO0
      inverted: true
    on_press:
      - switch.toggle: relay

# ---------------------------
# STATUS LED
# ---------------------------
status_led:
  pin:
    number: GPIO13
    inverted: true

# ---------------------------
# DIAGNOSTICS
# ---------------------------
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic
