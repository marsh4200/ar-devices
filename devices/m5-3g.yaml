esphome:
  project:
    name: "AR Smart Home.M5-3G"
    version: "1.0.0"
  on_boot:
    priority: 600
    then:
      - if:
          condition:
            switch.is_on: relay_1
          then:
            - light.turn_on: led1
          else:
            - light.turn_off: led1

      - if:
          condition:
            switch.is_on: relay_2
          then:
            - light.turn_on: led2
          else:
            - light.turn_off: led2

      - if:
          condition:
            switch.is_on: relay_3
          then:
            - light.turn_on: led3
          else:
            - light.turn_off: led3

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

# ---------------------------
# RELAYS (RESTORE LAST STATE)
# ---------------------------
switch:
  - platform: gpio
    id: relay_1
    name: "Switch 1"
    pin: GPIO23
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - light.turn_on: led1
    on_turn_off:
      - light.turn_off: led1

  - platform: gpio
    id: relay_2
    name: "Switch 2"
    pin: GPIO22
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - light.turn_on: led2
    on_turn_off:
      - light.turn_off: led2

  - platform: gpio
    id: relay_3
    name: "Switch 3"
    pin: GPIO19
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - light.turn_on: led3
    on_turn_off:
      - light.turn_off: led3

# ---------------------------
# OUTPUTS
# ---------------------------
output:
  - platform: gpio
    id: led1_output
    pin: GPIO16   # Top LED

  - platform: gpio
    id: led2_output
    pin: GPIO21   # Middle LED

  - platform: gpio
    id: led3_output
    pin: GPIO17   # Bottom LED

  - platform: ledc
    pin: GPIO18
    frequency: 1000 Hz
    id: pwm_output

# ---------------------------
# LIGHTS
# ---------------------------
light:
  - platform: binary
    id: led1
    name: "Touch LED Top"
    output: led1_output

  - platform: binary
    id: led2
    name: "Touch LED Middle"
    output: led2_output

  - platform: binary
    id: led3
    name: "Touch LED Bottom"
    output: led3_output

  - platform: monochromatic
    name: "Backlight LEDs"
    output: pwm_output

  - platform: status_led
    name: "WiFi Status"
    pin:
      number: GPIO5
      inverted: true

# ---------------------------
# BUTTONS
# ---------------------------
binary_sensor:
  - platform: gpio
    id: top_button
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
    on_press:
      - switch.toggle: relay_1

  - platform: gpio
    id: middle_button
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
    on_press:
      - switch.toggle: relay_3

  - platform: gpio
    id: bottom_button
    pin:
      number: GPIO15
      mode: INPUT_PULLUP
    on_press:
      - switch.toggle: relay_2

# ---------------------------
# PREFERENCES (CRITICAL)
# ---------------------------
preferences:
  flash_write_interval: 1min
