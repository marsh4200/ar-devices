esphome:
  project:
    name: "AR Smart Home.TX-3GANG"
    version: "1.0.0"

esp8266:
  board: esp01_1m

logger:

# ---------------------------
# BUTTONS
# ---------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    id: button_1
    on_press:
      - light.toggle: light_1

  - platform: gpio
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
      inverted: true
    id: button_2
    on_press:
      - light.toggle: light_2

  - platform: gpio
    pin:
      number: GPIO10
      mode:
        input: true
        pullup: true
      inverted: true
    id: button_3
    on_press:
      - light.toggle: light_3

  - platform: status
    name: "Device Status"

# ---------------------------
# OUTPUTS (RELAYS)
# ---------------------------
output:
  - platform: gpio
    pin: GPIO12
    id: relay_1

  - platform: gpio
    pin: GPIO5
    id: relay_2

  - platform: gpio
    pin: GPIO4
    id: relay_3

# ---------------------------
# LIGHTS (RESTORE LAST STATE)
# ---------------------------
light:
  - platform: binary
    name: "Light 1"
    id: light_1
    output: relay_1
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: binary
    name: "Light 2"
    id: light_2
    output: relay_2
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: binary
    name: "Light 3"
    id: light_3
    output: relay_3
    restore_mode: RESTORE_DEFAULT_OFF

# ---------------------------
# PREFERENCES
# ---------------------------
preferences:
  flash_write_interval: 1min
