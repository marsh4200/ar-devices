esphome:
  project:
    name: "AR Smart Home.TX-3GANG WITH DOUBLE TAP"
    version: "1.0.0"

esp8266:
  board: esp01_1m

logger:

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    id: button_1
    on_press:
      - script.execute:
          id: start_button_press
          button: 1
    on_release:
      - script.execute:
          id: release_button_press
          button: 1

  - platform: gpio
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
      inverted: true
    id: button_2
    on_press:
      - script.execute:
          id: start_button_press
          button: 2
    on_release:
      - script.execute:
          id: release_button_press
          button: 2

  - platform: gpio
    pin:
      number: GPIO10
      mode:
        input: true
        pullup: true
      inverted: true
    id: button_3
    on_press:
      - script.execute:
          id: start_button_press
          button: 3
    on_release:
      - script.execute:
          id: release_button_press
          button: 3

  - platform: status
    name: "Device Status"

output:
  - platform: gpio
    pin: GPIO12
    id: relay_1

  - platform: gpio
    pin: GPIO5
    id: relay_2

  - platform: gpio
    pin: GPIO4
    id: relay_3

light:
  - platform: binary
    name: "Light 1"
    id: light_1
    output: relay_1
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: binary
    name: "Light 2"
    id: light_2
    output: relay_2
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: binary
    name: "Light 3"
    id: light_3
    output: relay_3
    restore_mode: RESTORE_DEFAULT_OFF

preferences:
  flash_write_interval: 1min
