substitutions:
  device_model: Sonoff Switch

globals:
  - id: button_1_click_count
    type: int
    restore_value: no
    initial_value: "0"

  - id: button_2_click_count
    type: int
    restore_value: no
    initial_value: "0"

  - id: button_3_click_count
    type: int
    restore_value: no
    initial_value: "0"

script:
  - id: publish_button_event
    mode: queued
    parameters:
      button: int
      action: string
      count: int
    then:
      - homeassistant.event:
          event: esphome.sonoff_switch_button
          data:
            model: ${device_model}
            action: !lambda return action.c_str();
            button: !lambda return button;
            count: !lambda return count;
      - if:
          condition:
            lambda: return button == 1;
          then:
            - text_sensor.template.publish:
                id: ts_button_1_last_action
                state: !lambda return action.c_str();
      - if:
          condition:
            lambda: return button == 2;
          then:
            - text_sensor.template.publish:
                id: ts_button_2_last_action
                state: !lambda return action.c_str();
      - if:
          condition:
            lambda: return button == 3;
          then:
            - text_sensor.template.publish:
                id: ts_button_3_last_action
                state: !lambda return action.c_str();
      - text_sensor.template.publish:
          id: ts_last_button_event
          state: !lambda |-
            char buffer[48];
            snprintf(buffer, sizeof(buffer), "Button %d: %s (%d)", button, action.c_str(), count);
            return std::string(buffer);

  - id: run_relay_momentary
    mode: parallel
    parameters:
      relay: int
      duration_ms: int
    then:
      - if:
          condition:
            lambda: return relay == 1;
          then:
            - switch.turn_on: relay_1
      - if:
          condition:
            lambda: return relay == 2;
          then:
            - switch.turn_on: relay_2
      - if:
          condition:
            lambda: return relay == 3;
          then:
            - switch.turn_on: relay_3
      - delay: !lambda return (uint32_t) duration_ms;
      - if:
          condition:
            lambda: return relay == 1;
          then:
            - switch.turn_off: relay_1
      - if:
          condition:
            lambda: return relay == 2;
          then:
            - switch.turn_off: relay_2
      - if:
          condition:
            lambda: return relay == 3;
          then:
            - switch.turn_off: relay_3

  - id: run_homeassistant_momentary
    mode: parallel
    parameters:
      entity_id: string
      duration_ms: int
    then:
      - homeassistant.action:
          action: homeassistant.turn_on
          data:
            entity_id: !lambda return entity_id.c_str();
      - delay: !lambda return (uint32_t) duration_ms;
      - homeassistant.action:
          action: homeassistant.turn_off
          data:
            entity_id: !lambda return entity_id.c_str();

  - id: handle_single_click
    mode: queued
    parameters:
      button: int
    then:
      - script.execute:
          id: publish_button_event
          button: !lambda return button;
          action: "click"
          count: 1
      - if:
          condition:
            lambda: return button == 1;
          then:
            - if:
                condition:
                  switch.is_on: sw_button_1_click_momentary_enabled
                then:
                  - script.execute:
                      id: run_relay_momentary
                      relay: 1
                      duration_ms: !lambda return (int) (id(num_button_1_click_momentary_s).state * 1000.0f);
                else:
                  - switch.toggle: relay_1
      - if:
          condition:
            lambda: return button == 2;
          then:
            - if:
                condition:
                  switch.is_on: sw_button_2_click_momentary_enabled
                then:
                  - script.execute:
                      id: run_relay_momentary
                      relay: 2
                      duration_ms: !lambda return (int) (id(num_button_2_click_momentary_s).state * 1000.0f);
                else:
                  - switch.toggle: relay_2
      - if:
          condition:
            lambda: return button == 3;
          then:
            - if:
                condition:
                  switch.is_on: sw_button_3_click_momentary_enabled
                then:
                  - script.execute:
                      id: run_relay_momentary
                      relay: 3
                      duration_ms: !lambda return (int) (id(num_button_3_click_momentary_s).state * 1000.0f);
                else:
                  - switch.toggle: relay_3

  - id: handle_double_click
    mode: queued
    parameters:
      button: int
    then:
      - script.execute:
          id: publish_button_event
          button: !lambda return button;
          action: "double_click"
          count: 2
      - lambda: |-
          std::string configured_action = "None";
          std::string target_entity_id;
          if (button == 1) {
            configured_action = id(sl_button_1_double_click_action).state;
            target_entity_id = id(txt_button_1_double_click_target).state;
          } else if (button == 2) {
            configured_action = id(sl_button_2_double_click_action).state;
            target_entity_id = id(txt_button_2_double_click_target).state;
          } else if (button == 3) {
            configured_action = id(sl_button_3_double_click_action).state;
            target_entity_id = id(txt_button_3_double_click_target).state;
          }
          ESP_LOGI("double_click",
                   "Button %d double-click action: '%s' target='%s'",
                   button,
                   configured_action.c_str(),
                   target_entity_id.c_str());
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Relay 1 (toggle)";
              if (button == 2) return id(sl_button_2_double_click_action).state == "Relay 1 (toggle)";
              return id(sl_button_3_double_click_action).state == "Relay 1 (toggle)";
          then:
            - switch.toggle: relay_1
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Relay 1 (momentary)";
              if (button == 2) return id(sl_button_2_double_click_action).state == "Relay 1 (momentary)";
              return id(sl_button_3_double_click_action).state == "Relay 1 (momentary)";
          then:
            - script.execute:
                id: run_relay_momentary
                relay: 1
                duration_ms: !lambda |-
                  if (button == 1) return (int) (id(num_button_1_double_click_momentary_s).state * 1000.0f);
                  if (button == 2) return (int) (id(num_button_2_double_click_momentary_s).state * 1000.0f);
                  return (int) (id(num_button_3_double_click_momentary_s).state * 1000.0f);
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Relay 2 (toggle)";
              if (button == 2) return id(sl_button_2_double_click_action).state == "Relay 2 (toggle)";
              return id(sl_button_3_double_click_action).state == "Relay 2 (toggle)";
          then:
            - switch.toggle: relay_2
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Relay 2 (momentary)";
              if (button == 2) return id(sl_button_2_double_click_action).state == "Relay 2 (momentary)";
              return id(sl_button_3_double_click_action).state == "Relay 2 (momentary)";
          then:
            - script.execute:
                id: run_relay_momentary
                relay: 2
                duration_ms: !lambda |-
                  if (button == 1) return (int) (id(num_button_1_double_click_momentary_s).state * 1000.0f);
                  if (button == 2) return (int) (id(num_button_2_double_click_momentary_s).state * 1000.0f);
                  return (int) (id(num_button_3_double_click_momentary_s).state * 1000.0f);
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Relay 3 (toggle)";
              if (button == 2) return id(sl_button_2_double_click_action).state == "Relay 3 (toggle)";
              return id(sl_button_3_double_click_action).state == "Relay 3 (toggle)";
          then:
            - switch.toggle: relay_3
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Relay 3 (momentary)";
              if (button == 2) return id(sl_button_2_double_click_action).state == "Relay 3 (momentary)";
              return id(sl_button_3_double_click_action).state == "Relay 3 (momentary)";
          then:
            - script.execute:
                id: run_relay_momentary
                relay: 3
                duration_ms: !lambda |-
                  if (button == 1) return (int) (id(num_button_1_double_click_momentary_s).state * 1000.0f);
                  if (button == 2) return (int) (id(num_button_2_double_click_momentary_s).state * 1000.0f);
                  return (int) (id(num_button_3_double_click_momentary_s).state * 1000.0f);
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Home Assistant target (toggle)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Home Assistant target (toggle)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Home Assistant target (toggle)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: homeassistant.toggle
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Home Assistant target (turn on)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Home Assistant target (turn on)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Home Assistant target (turn on)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: homeassistant.turn_on
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Home Assistant target (turn off)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Home Assistant target (turn off)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Home Assistant target (turn off)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: homeassistant.turn_off
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Home Assistant target (momentary)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Home Assistant target (momentary)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Home Assistant target (momentary)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - script.execute:
                id: run_homeassistant_momentary
                entity_id: !lambda |-
                  if (button == 1) return id(txt_button_1_double_click_target).state;
                  if (button == 2) return id(txt_button_2_double_click_target).state;
                  return id(txt_button_3_double_click_target).state;
                duration_ms: !lambda |-
                  if (button == 1) return (int) (id(num_button_1_double_click_momentary_s).state * 1000.0f);
                  if (button == 2) return (int) (id(num_button_2_double_click_momentary_s).state * 1000.0f);
                  return (int) (id(num_button_3_double_click_momentary_s).state * 1000.0f);
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Cover target (open)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Cover target (open)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Cover target (open)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: cover.open_cover
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Cover target (close)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Cover target (close)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Cover target (close)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: cover.close_cover
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Cover target (stop)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Cover target (stop)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Cover target (stop)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: cover.stop_cover
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Cover target (toggle)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Cover target (toggle)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Cover target (toggle)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: homeassistant.toggle
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Media player target (play/pause)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Media player target (play/pause)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Media player target (play/pause)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: media_player.media_play_pause
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Media player target (next track)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Media player target (next track)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Media player target (next track)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: media_player.media_next_track
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Media player target (previous track)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Media player target (previous track)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Media player target (previous track)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: media_player.media_previous_track
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Media player target (stop)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Media player target (stop)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Media player target (stop)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: media_player.media_stop
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Script target (run)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Script target (run)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Script target (run)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: script.turn_on
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Scene target (activate)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Scene target (activate)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Scene target (activate)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: scene.turn_on
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Button target (press)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Button target (press)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Button target (press)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: button.press
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();
      - if:
          condition:
            lambda: |-
              if (button == 1) return id(sl_button_1_double_click_action).state == "Automation target (trigger)" && !id(txt_button_1_double_click_target).state.empty();
              if (button == 2) return id(sl_button_2_double_click_action).state == "Automation target (trigger)" && !id(txt_button_2_double_click_target).state.empty();
              return id(sl_button_3_double_click_action).state == "Automation target (trigger)" && !id(txt_button_3_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: automation.trigger
                data:
                  entity_id: !lambda |-
                    if (button == 1) return id(txt_button_1_double_click_target).state.c_str();
                    if (button == 2) return id(txt_button_2_double_click_target).state.c_str();
                    return id(txt_button_3_double_click_target).state.c_str();

  - id: start_button_press
    mode: queued
    parameters:
      button: int
    then:
      - lambda: return;

  - id: release_button_press
    mode: queued
    parameters:
      button: int
    then:
      - if:
          condition:
            lambda: return button == 1;
          then:
            - lambda: id(button_1_click_count) += 1;
            - script.execute: resolve_button_1_clicks
      - if:
          condition:
            lambda: return button == 2;
          then:
            - lambda: id(button_2_click_count) += 1;
            - script.execute: resolve_button_2_clicks
      - if:
          condition:
            lambda: return button == 3;
          then:
            - lambda: id(button_3_click_count) += 1;
            - script.execute: resolve_button_3_clicks

  - id: resolve_button_1_clicks
    mode: restart
    then:
      - delay: !lambda return (uint32_t) id(num_button_1_double_click_ms).state;
      - if:
          condition:
            lambda: return id(button_1_click_count) == 1;
          then:
            - script.execute:
                id: handle_single_click
                button: 1
      - if:
          condition:
            lambda: return id(button_1_click_count) >= 2;
          then:
            - script.execute:
                id: handle_double_click
                button: 1
      - lambda: id(button_1_click_count) = 0;

