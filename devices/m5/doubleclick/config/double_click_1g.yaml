substitutions:
  device_model: Sonoff Switch

globals:
  - id: button_1_click_count
    type: int
    restore_value: no
    initial_value: "0"

script:
  - id: publish_button_event
    mode: queued
    parameters:
      button: int
      action: string
      count: int
    then:
      - homeassistant.event:
          event: esphome.sonoff_switch_button
          data:
            model: ${device_model}
            action: !lambda return action.c_str();
            button: !lambda return button;
            count: !lambda return count;
      - if:
          condition:
            lambda: return button == 1;
          then:
            - text_sensor.template.publish:
                id: ts_button_1_last_action
                state: !lambda return action.c_str();
      - text_sensor.template.publish:
          id: ts_last_button_event
          state: !lambda |-
            char buffer[48];
            snprintf(buffer, sizeof(buffer), "Button %d: %s (%d)", button, action.c_str(), count);
            return std::string(buffer);

  - id: run_relay_momentary
    mode: parallel
    parameters:
      relay: int
      duration_ms: int
    then:
      - if:
          condition:
            lambda: return relay == 1;
          then:
            - switch.turn_on: relay_1
      - delay: !lambda return (uint32_t) duration_ms;
      - if:
          condition:
            lambda: return relay == 1;
          then:
            - switch.turn_off: relay_1

  - id: run_homeassistant_momentary
    mode: parallel
    parameters:
      entity_id: string
      duration_ms: int
    then:
      - homeassistant.action:
          action: homeassistant.turn_on
          data:
            entity_id: !lambda return entity_id.c_str();
      - delay: !lambda return (uint32_t) duration_ms;
      - homeassistant.action:
          action: homeassistant.turn_off
          data:
            entity_id: !lambda return entity_id.c_str();

  - id: handle_single_click
    mode: queued
    parameters:
      button: int
    then:
      - script.execute:
          id: publish_button_event
          button: !lambda return button;
          action: "click"
          count: 1
      - if:
          condition:
            switch.is_on: sw_button_1_click_momentary_enabled
          then:
            - script.execute:
                id: run_relay_momentary
                relay: 1
                duration_ms: !lambda return (int) (id(num_button_1_click_momentary_s).state * 1000.0f);
          else:
            - switch.toggle: relay_1

  - id: handle_double_click
    mode: queued
    parameters:
      button: int
    then:
      - script.execute:
          id: publish_button_event
          button: !lambda return button;
          action: "double_click"
          count: 2
      - if:
          condition:
            lambda: return id(sl_button_1_double_click_action).state == "Relay 1 (toggle)";
          then:
            - switch.toggle: relay_1

      - if:
          condition:
            lambda: return id(sl_button_1_double_click_action).state == "Relay 1 (momentary)";
          then:
            - script.execute:
                id: run_relay_momentary
                relay: 1
                duration_ms: !lambda return (int) (id(num_button_1_double_click_momentary_s).state * 1000.0f);

      - if:
          condition:
            lambda: return id(sl_button_1_double_click_action).state == "Home Assistant target (toggle)" && !id(txt_button_1_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: homeassistant.toggle
                data:
                  entity_id: !lambda return id(txt_button_1_double_click_target).state.c_str();

      - if:
          condition:
            lambda: return id(sl_button_1_double_click_action).state == "Home Assistant target (turn on)" && !id(txt_button_1_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: homeassistant.turn_on
                data:
                  entity_id: !lambda return id(txt_button_1_double_click_target).state.c_str();

      - if:
          condition:
            lambda: return id(sl_button_1_double_click_action).state == "Home Assistant target (turn off)" && !id(txt_button_1_double_click_target).state.empty();
          then:
            - homeassistant.action:
                action: homeassistant.turn_off
                data:
                  entity_id: !lambda return id(txt_button_1_double_click_target).state.c_str();

      - if:
          condition:
            lambda: return id(sl_button_1_double_click_action).state == "Home Assistant target (momentary)" && !id(txt_button_1_double_click_target).state.empty();
          then:
            - script.execute:
                id: run_homeassistant_momentary
                entity_id: !lambda return id(txt_button_1_double_click_target).state;
                duration_ms: !lambda return (int) (id(num_button_1_double_click_momentary_s).state * 1000.0f);

  - id: start_button_press
    mode: queued
    parameters:
      button: int
    then:
      - lambda: return;

  - id: release_button_press
    mode: restart
    parameters:
      button: int
    then:
      - lambda: |-
          if (button == 1) {
            id(button_1_click_count) += 1;
          }
      - delay: !lambda return (uint32_t) id(num_button_1_double_click_ms).state;
      - if:
          condition:
            lambda: return button == 1 && id(button_1_click_count) == 1;
          then:
            - script.execute:
                id: handle_single_click
                button: !lambda return button;
      - if:
          condition:
            lambda: return button == 1 && id(button_1_click_count) >= 2;
          then:
            - script.execute:
                id: handle_double_click
                button: !lambda return button;
      - lambda: |-
          if (button == 1) {
            id(button_1_click_count) = 0;
          }

select:
  - platform: template
    id: sl_button_1_double_click_action
    name: Button 1 double-click action
    optimistic: true
    restore_value: true
    icon: mdi:gesture-double-tap
    entity_category: config
    options:
      - None
      - Relay 1 (toggle)
      - Relay 1 (momentary)
      - Home Assistant target (toggle)
      - Home Assistant target (turn on)
      - Home Assistant target (turn off)
      - Home Assistant target (momentary)
    initial_option: None

switch:
  - platform: template
    id: sw_button_1_click_momentary_enabled
    name: Button 1 click momentary
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: mdi:gesture-tap-button

number:
  - platform: template
    id: num_button_1_double_click_ms
    name: Button 1 double-click timer
    optimistic: true
    restore_value: true
    entity_category: config
    icon: mdi:timer-cog-outline
    unit_of_measurement: ms
    min_value: 150
    max_value: 1000
    step: 25
    mode: box
    initial_value: 350

  - platform: template
    id: num_button_1_click_momentary_s
    name: Button 1 click momentary time
    optimistic: true
    restore_value: true
    entity_category: config
    icon: mdi:timer-outline
    unit_of_measurement: s
    min_value: 0.5
    max_value: 30
    step: 0.5
    mode: box
    initial_value: 1

  - platform: template
    id: num_button_1_double_click_momentary_s
    name: Button 1 double-click momentary time
    optimistic: true
    restore_value: true
    entity_category: config
    icon: mdi:timer-outline
    unit_of_measurement: s
    min_value: 0.5
    max_value: 30
    step: 0.5
    mode: box
    initial_value: 1

text:
  - platform: template
    id: txt_button_1_double_click_target
    name: Button 1 double-click target
    mode: text
    optimistic: true
    restore_value: true
    entity_category: config
    icon: mdi:form-textbox
    initial_value: ""
    min_length: 0
    max_length: 100

text_sensor:
  - platform: template
    id: ts_button_1_last_action
    name: Button 1 last action
    icon: mdi:gesture-tap
    entity_category: diagnostic

  - platform: template
    id: ts_last_button_event
    name: Last button event
    icon: mdi:timeline-text-outline
    entity_category: diagnostic
