############################################
# 🔧 AR SMART HOME – M5 1G DEVICE
# (HARDWARE ONLY)
############################################

esphome:
  project:
    name: "AR Smart Home.M5-1GANG WITH LONG PRESS"
    version: "1.0.0"

############################################
# 🔴 STATUS LED
############################################
status_led:
  pin:
    number: GPIO5
    inverted: true

############################################
# 🔁 RESTART BUTTON
############################################
button:
  - platform: restart
    name: "Restart"

############################################
# ⚡ RELAY
############################################
switch:
  - platform: gpio
    id: relay_1
    name: "Relay 1"
    pin: GPIO23
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    id: backlight_switch
    name: "Backlight Switch"
    lambda: |-
      return id(backlight_leds).current_values.is_on();
    turn_on_action:
      - light.turn_on: backlight_leds
    turn_off_action:
      - light.turn_off: backlight_leds

############################################
# BACKLIGHT
############################################
output:
  - platform: ledc
    pin: GPIO18
    frequency: 1000 Hz
    id: pwm_output

light:
  - platform: monochromatic
    id: backlight_leds
    name: "Backlight LEDs"
    output: pwm_output

############################################
# 🔘 BUTTON (MULTI-CLICK)
############################################
binary_sensor:
  - platform: gpio
    id: button_1
    name: "Button 1"
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

    on_press:
      then:
        - script.execute:
            id: start_button_press
            button: 1

    on_release:
      then:
        - script.execute:
            id: release_button_press
            button: 1
