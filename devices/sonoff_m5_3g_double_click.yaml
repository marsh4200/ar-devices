substitutions:
  name: sonoff-m5-3g
  friendly_name: Sonoff M5 3G

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_password

packages:
  double_click: !include
    file: sonoff_double_click_common.yaml
    vars:
      device_model: Sonoff M5 3G

status_led:
  pin:
    number: GPIO5
    inverted: true

button:
  - platform: restart
    name: ${friendly_name} Restart

switch:
  - platform: gpio
    id: relay_1
    name: ${friendly_name} Relay 1
    pin: GPIO23
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: relay_2
    name: ${friendly_name} Relay 2
    pin: GPIO19
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: relay_3
    name: ${friendly_name} Relay 3
    pin: GPIO22
    restore_mode: RESTORE_DEFAULT_OFF

binary_sensor:
  - platform: gpio
    id: button_1
    name: ${friendly_name} Button 1
    pin:
      number: GPIO4
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_multi_click:
      - timing:
          - ON for at most 350ms
          - OFF for at most 300ms
          - ON for at most 350ms
          - OFF for at least 200ms
        then:
          - script.execute:
              id: handle_double_click
              button: 1
      - timing:
          - ON for at most 500ms
          - OFF for at least 250ms
        then:
          - script.execute:
              id: handle_single_click
              button: 1
      - timing:
          - ON for at least 700ms
        then:
          - script.execute:
              id: handle_long_press
              button: 1

  - platform: gpio
    id: button_2
    name: ${friendly_name} Button 2
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_multi_click:
      - timing:
          - ON for at most 350ms
          - OFF for at most 300ms
          - ON for at most 350ms
          - OFF for at least 200ms
        then:
          - script.execute:
              id: handle_double_click
              button: 2
      - timing:
          - ON for at most 500ms
          - OFF for at least 250ms
        then:
          - script.execute:
              id: handle_single_click
              button: 2
      - timing:
          - ON for at least 700ms
        then:
          - script.execute:
              id: handle_long_press
              button: 2

  - platform: gpio
    id: button_3
    name: ${friendly_name} Button 3
    pin:
      number: GPIO15
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_multi_click:
      - timing:
          - ON for at most 350ms
          - OFF for at most 300ms
          - ON for at most 350ms
          - OFF for at least 200ms
        then:
          - script.execute:
              id: handle_double_click
              button: 3
      - timing:
          - ON for at most 500ms
          - OFF for at least 250ms
        then:
          - script.execute:
              id: handle_single_click
              button: 3
      - timing:
          - ON for at least 700ms
        then:
          - script.execute:
              id: handle_long_press
              button: 3
