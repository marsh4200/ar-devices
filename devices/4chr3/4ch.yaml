esphome:
  name: 4channel
  project:
    name: "AR Smart Home.4CH-R3"
    version: "1.0.0"

esp8266:
  board: esp8285

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

api:

ota:

# ---------------------------
# RELAYS
# ---------------------------
switch:
  - platform: gpio
    name: "Relay 1"
    id: relay1
    pin: GPIO12
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    name: "Relay 2"
    id: relay2
    pin: GPIO5
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    name: "Relay 3"
    id: relay3
    pin: GPIO4
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    name: "Relay 4"
    id: relay4
    pin: GPIO15
    restore_mode: RESTORE_DEFAULT_OFF

# ---------------------------
# BUTTONS
# ---------------------------
binary_sensor:
  - platform: gpio
    name: "Button 1"
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - switch.toggle: relay1

  - platform: gpio
    name: "Button 2"
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - switch.toggle: relay2

  - platform: gpio
    name: "Button 3"
    pin:
      number: GPIO10
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - switch.toggle: relay3

  - platform: gpio
    name: "Button 4"
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - switch.toggle: relay4

# ---------------------------
# WIFI STATUS LED
# ---------------------------
status_led:
  pin:
    number: GPIO13
    inverted: true

# ---------------------------
# PREFERENCES
# ---------------------------
preferences:
  flash_write_interval: 1min
