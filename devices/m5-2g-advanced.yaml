esphome:
  project:
    name: "AR Smart Home.M5-2GANG WITH MULTICLICK"
    version: "1.0.0"

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

# ---------------------------
# INCLUDE DOUBLE CLICK SYSTEM
# ---------------------------
packages:
  double_click: !include
    file: sonoff_double_click_common.yaml
    vars:
      device_model: Sonoff M5 2G

# ---------------------------
# STATUS LED
# ---------------------------
status_led:
  pin:
    number: GPIO5
    inverted: true

# ---------------------------
# RESTART
# ---------------------------
button:
  - platform: restart
    name: "Restart"

# ---------------------------
# RELAYS
# ---------------------------
switch:
  - platform: gpio
    id: relay_1
    name: "Switch 1"
    pin: GPIO23
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: gpio
    id: relay_2
    name: "Switch 2"
    pin: GPIO19
    restore_mode: RESTORE_DEFAULT_OFF

  # Virtual relay (for scripts)
  - platform: template
    id: relay_3
    internal: true
    optimistic: true
    turn_on_action: []
    turn_off_action: []

# ---------------------------
# BUTTONS
# ---------------------------
binary_sensor:
  - platform: gpio
    id: button_1
    name: "Button 1"
    pin:
      number: GPIO4
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

    on_multi_click:
      # DOUBLE CLICK
      - timing:
          - ON for at most 350ms
          - OFF for at most 300ms
          - ON for at most 350ms
          - OFF for at least 200ms
        then:
          - script.execute:
              id: handle_double_click
              button: 1

      # SINGLE CLICK
      - timing:
          - ON for at most 500ms
          - OFF for at least 250ms
        then:
          - script.execute:
              id: handle_single_click
              button: 1

      # LONG PRESS
      - timing:
          - ON for at least 700ms
        then:
          - script.execute:
              id: handle_long_press
              button: 1

  - platform: gpio
    id: button_2
    name: "Button 2"
    pin:
      number: GPIO15
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

    on_multi_click:
      # DOUBLE CLICK
      - timing:
          - ON for at most 350ms
          - OFF for at most 300ms
          - ON for at most 350ms
          - OFF for at least 200ms
        then:
          - script.execute:
              id: handle_double_click
              button: 2

      # SINGLE CLICK
      - timing:
          - ON for at most 500ms
          - OFF for at least 250ms
        then:
          - script.execute:
              id: handle_single_click
              button: 2

      # LONG PRESS
      - timing:
          - ON for at least 700ms
        then:
          - script.execute:
              id: handle_long_press
              button: 2
