############################################
# 🔧 AR SMART HOME – M5-2G SETUP
# 👉 EDIT BEFORE FLASHING
############################################

substitutions:
  device_name: "PUT_YOURE_DEVICE_NAME_HERE"
  friendly_name: "PUT_FRIENDLY_NAME_HERE"

############################################
# ⚙️ DEVICE NAME
############################################
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

############################################
# 📡 WIFI SETTINGS
############################################
wifi:
  ssid: "PUT_YOURE_WIFI_NAME_HERE"
  password: "PUT_WIFI_PASSWORD_HERE"
  reboot_timeout: 0s

############################################
# 🔐 API & OTA SETTINGS
############################################
api:
  encryption:
    key: "PUT_API_KEY_HERE"
  reboot_timeout: 0s

ota:
  platform: esphome

############################################
# 📦 LOAD DEVICE PACKAGE
############################################
packages:
  device:
    url: https://github.com/marsh4200/ar-devices
    ref: main
    file: devices/m5/standard/m5-2g.yaml
    refresh: 0min
