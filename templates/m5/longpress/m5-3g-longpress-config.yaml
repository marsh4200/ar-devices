############################################
# 🔧 AR SMART HOME – M5 3G SETUP
# 👉 EDIT BEFORE FLASHING
############################################

substitutions:
  device_name: "PUT_DEVICE_NAME_HERE"
  friendly_name: "PUT_FRIENDLY_NAME_HERE"

############################################
# WIFI
############################################
wifi:
  ssid: "PUT_WIFI_NAME_HERE"
  password: "PUT_WIFI_PASSWORD_HERE"
  fast_connect: true
  reboot_timeout: 0s

############################################
# API / OTA
############################################
api:

ota:
  platform: esphome

############################################
# DEVICE NAME
############################################
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

############################################
# PACKAGES 
############################################
packages:
  double_click:
    url: https://github.com/marsh4200/ar-devices
    ref: main
    file: devices/m5/longpress/config/long_press_3g.yaml
    refresh: 0s

  device:
    url: https://github.com/marsh4200/ar-devices
    ref: main
    file: devices/m5/longpress/m5-3g-longpress.yaml
    refresh: 0s
