############################################
# 🔧 AR SMART HOME – M5 3G ADVANCED
# 👉 EDIT BEFORE FLASHING
############################################

substitutions:
  device_name: "PUT_DEVICE_NAME_HERE"
  friendly_name: "PUT_FRIENDLY_NAME_HERE"

############################################
# 🧠 CORE
############################################
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

############################################
# 📡 WIFI
############################################
wifi:
  ssid: "PUT_WIFI_NAME_HERE"
  password: "PUT_WIFI_PASSWORD_HERE"
  fast_connect: true
  reboot_timeout: 0s

############################################
# 🔐 API
############################################
api:
  encryption:
    key: "PUT_API_ENCRYPTION_KEY_HERE"

############################################
# 🔄 OTA
############################################
ota:
  platform: esphome
  password: "PUT_OTA_PASSWORD_HERE"

############################################
# 📦 PACKAGES (DO NOT CHANGE)
############################################
packages:
  double_click:
    url: https://github.com/marsh4200/ar-devices
    ref: main
    file: devices/sonoff_double_click_common.yaml
    refresh: 0s

  device:
    url: https://github.com/marsh4200/ar-devices
    ref: main
    file: devices/m5-2g-advanced.yaml
    refresh: 0s
